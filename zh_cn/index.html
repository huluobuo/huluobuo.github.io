<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人简介</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1c1c1c;
            color: #e0e0e0;
            margin: 0;
            padding: 0;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #e0e0e067;
            padding: 10px 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        .header a {
            margin-right: 20px;
            text-decoration: none;
        }
        .header a:first-child {
            margin-right: 40px;
        }
        .header img {
            width: 40px;
            transition: transform 0.3s;
        }
        .header img:hover {
            transform: scale(1.1);
        }
        .header .title {
            font-size: 1.5em;
            color: #1c1c1c;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background-color: #2c2c2c;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            transition: transform 0.3s;
        }
        .container:hover {
            transform: scale(1.02);
        }
        h2 {
            color: #b0b0b0;
        }
        .section {
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 1.5em;
            margin-bottom: 10px;
        }
        .info {
            line-height: 1.6;
        }
        .info p, .info li {
            transition: color 0.3s;
        }
        .info p:hover, .info li:hover {
            color: #ffffff;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li::before {
            content: "• ";
            color: #b0b0b0;
        }

    </style>
</head>
<body>

</body>
